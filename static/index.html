<!doctype html>
<meta charset="utf-8" />
<title>LM Studio Web Chat</title>
<style>
  :root{
    --bg:#0b0f13;       /* page background */
    --panel:#0f141b;    /* panels */
    --muted:#202938;    /* borders, subtle accents */
    --text:#e6eaf0;     /* primary text */
    --accent:#3b82f6;   /* primary action */
    --accent-2:#2563eb; /* hover */
    --u-bubble:#1f2a44; /* user bubble */
    --a-bubble:#14261a; /* assistant bubble */
  }
  *{box-sizing:border-box}
  body{font:14px system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,sans-serif;margin:0;background:linear-gradient(180deg,#0a0e12, #0b1016 40%, #0b0f13);color:var(--text)}
  #wrap{max-width:900px;margin:28px auto;padding:0 18px}
  h2{font-weight:600;letter-spacing:.2px;margin:16px 0 12px;color:#f3f6fb}

  #log{
    border:1px solid var(--muted);
    padding:16px;
    min-height:420px;
    background:var(--panel);
    border-radius:12px;
    box-shadow:0 8px 24px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.02);
    display:flex;flex-direction:column;gap:10px;overflow:auto
  }
  /* Make links in chat white */
  #log a,#log a:visited{color:#fff}
  #log a:hover{color:#f3f6fb;text-decoration:underline;text-underline-offset:2px}
  .chat-message{display:flex;flex-direction:column;gap:6px;max-width:85%}
  .chat-message.user{align-self:flex-end;align-items:flex-end}
  .chat-message.assistant{align-self:flex-start;align-items:flex-start}
  .u,.a{white-space:pre-wrap;max-width:85%;padding:10px 12px;border-radius:12px;line-height:1.35}
  .chat-message>.u,.chat-message>.a{max-width:100%}
  .u{align-self:flex-end;background:var(--u-bubble);color:#eaf3ff;box-shadow:0 2px 8px rgba(8,20,40,.35)}
  .a{align-self:flex-start;background:var(--a-bubble);color:#e6ffe6;box-shadow:0 2px 8px rgba(0,30,10,.35)}
  .u b,.a b{opacity:.85}
  .message-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-height:28px;color:#a8b3c5}
  .chat-message.user .message-footer{justify-content:flex-end}
  .message-meta{display:flex;gap:6px;flex-wrap:wrap}
  .meta-chip{display:inline-flex;align-items:center;gap:4px;min-height:24px;padding:3px 8px;border-radius:999px;background:rgba(255,255,255,.07);color:#c9d2df;font-size:12px;font-weight:600;white-space:nowrap}
  .message-actions{display:flex;align-items:center;gap:4px;opacity:.7;transition:opacity .15s ease}
  .chat-message:hover .message-actions,.message-actions:focus-within{opacity:1}
  .icon-btn{width:28px;height:28px;min-width:28px;padding:0;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);box-shadow:none;color:#b8c2d2}
  .icon-btn:hover{background:rgba(255,255,255,.09);filter:none;color:#fff}
  .icon-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .pending{color:#dcfce7}
  .pending-row{display:inline-flex;align-items:center;gap:8px;margin-top:2px;color:#ccefd1}
  .pending-dots{display:inline-flex;gap:4px;align-items:center;height:12px}
  .pending-dots i{width:6px;height:6px;border-radius:999px;background:#9be7a6;opacity:.35;animation:pulse 1.1s ease-in-out infinite}
  .pending-dots i:nth-child(2){animation-delay:.16s}
  .pending-dots i:nth-child(3){animation-delay:.32s}
  .pending-status{font-weight:600}
  .pending-time{color:#a4c9ad;font-size:12px}
  @keyframes pulse{
    0%,80%,100%{opacity:.35;transform:translateY(0)}
    40%{opacity:1;transform:translateY(-2px)}
  }
  /* Markdown blocks inside bubbles */
  .md{white-space:normal}
  .md p{margin:6px 0}
  .md ul,.md ol{margin:6px 0 6px 18px}
  .md li{margin:4px 0}
  .md code{background:rgba(255,255,255,.08);padding:2px 4px;border-radius:4px}
  .md pre{background:rgba(0,0,0,.35);padding:8px 10px;border-radius:8px;overflow:auto}
  .md h1,.md h2{margin:6px 0 4px}
  .md h3,.md h4,.md h5,.md h6{margin:6px 0 2px}

  #bar{display:flex;gap:10px;margin-top:14px;align-items:flex-end}
  textarea{
    flex:1;min-height:56px;max-height:160px;resize:none;overflow:auto;
    background:#0e131a;color:var(--text);
    border:1px solid var(--muted);border-radius:10px;padding:10px 12px;
    outline:none;box-shadow:inset 0 1px 0 rgba(255,255,255,.02);
    transition:border-color .15s ease, box-shadow .15s ease
  }
  textarea::placeholder{color:#9aa8bf}
  textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.25),inset 0 1px 0 rgba(255,255,255,.02)}

  button{
    min-width:120px;height:40px;padding:0 14px;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(180deg,var(--accent),var(--accent-2));
    color:#fff;border:1px solid #1d4ed8;border-radius:10px;cursor:pointer;
    font-weight:600;letter-spacing:.2px;box-shadow:0 6px 16px rgba(37,99,235,.35);
    transition:transform .06s ease, filter .2s ease, opacity .2s ease
  }
  button:hover{filter:brightness(1.05)}
  button:active{transform:translateY(1px)}
  button:disabled{opacity:.6;cursor:not-allowed;filter:grayscale(.2)}
</style>
<div id="wrap">
  <h2>LM Studio Web Chat</h2>
  <div id="log"></div>
  <div id="bar">
    <textarea id="msg" placeholder="Ask something…"></textarea>
    <button id="send">Send</button>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.1/dist/markdown-it.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
<script>
  const log=document.getElementById('log'),msg=document.getElementById('msg'),send=document.getElementById('send');let thread=null;let md=null;
  const messageEls=new Map();
  const cssEscape=window.CSS&&CSS.escape?CSS.escape:(s=>String(s).replace(/["\\]/g,'\\$&'));
  const icons={
    copy:'<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="11" height="11" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>',
    edit:'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>',
    trash:'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v5"></path><path d="M14 11v5"></path></svg>'
  };
  function uid(){return window.crypto&&crypto.randomUUID?crypto.randomUUID():`tmp-${Date.now()}-${Math.random().toString(16).slice(2)}`;}
  function renderMarkdown(s){
    if(!md && window.markdownit){md=window.markdownit({html:false,linkify:true,typographer:true,breaks:true});}
    const raw=md?md.render(String(s||'')):String(s||'');
    return window.DOMPurify?window.DOMPurify.sanitize(raw):raw;
  }
  function formatMessage(role,text){return (role==='user'?'<b>You:</b> ':'<b>Assistant:</b> ')+renderMarkdown(text||'');}
  function prepareLinks(d){d.querySelectorAll('a').forEach(a=>{a.target='_blank';a.rel='noopener';});}
  function fmtSeconds(v){if(v===null||v===undefined||Number.isNaN(Number(v)))return null;const n=Number(v);return `${n<10?n.toFixed(2):n.toFixed(1)}s`;}
  function fmtRate(v){if(v===null||v===undefined||Number.isNaN(Number(v)))return null;return `${Number(v).toFixed(1)} tok/sec`;}
  function addChip(parent,text,title){
    if(!text)return;
    const chip=document.createElement('span');
    chip.className='meta-chip';
    chip.textContent=text;
    if(title)chip.title=title;
    parent.appendChild(chip);
  }
  function buildMeta(meta){
    const wrap=document.createElement('div');
    wrap.className='message-meta';
    if(!meta)return wrap;
    addChip(wrap,fmtRate(meta.tokens_per_second),'Generated tokens per second');
    const tokens=meta.total_tokens||meta.completion_tokens;
    addChip(wrap,tokens?`${tokens} tokens`:null,'Total tokens reported by LM Studio');
    addChip(wrap,fmtSeconds(meta.response_seconds),'Total request time measured by the web app');
    addChip(wrap,fmtSeconds(meta.thinking_seconds)?`think ${fmtSeconds(meta.thinking_seconds)}`:null,'Estimated thinking time from reasoning-token share');
    addChip(wrap,meta.stop_reason?`stop: ${meta.stop_reason}`:null,'LM Studio finish reason');
    return wrap;
  }
  function iconButton(kind,title,onClick){
    const btn=document.createElement('button');
    btn.type='button';
    btn.className='icon-btn';
    btn.title=title;
    btn.setAttribute('aria-label',title);
    btn.innerHTML=icons[kind];
    btn.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();onClick(btn);});
    return btn;
  }
  async function copyText(text,btn){
    try{
      if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(text);}
      else{
        const t=document.createElement('textarea');t.value=text;t.style.position='fixed';t.style.opacity='0';document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();
      }
      const old=btn.title;btn.title='Copied';setTimeout(()=>{btn.title=old;},900);
    }catch(e){btn.title='Copy failed';setTimeout(()=>{btn.title='Copy message';},1200);}
  }
  async function apiPost(path,payload){
    const r=await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const j=await r.json().catch(()=>({}));
    if(!r.ok)throw new Error(j.error||r.statusText);
    return j;
  }
  function assignMessageId(el,id){
    const old=el.dataset.messageId;
    if(old)messageEls.delete(old);
    el.dataset.messageId=id;
    messageEls.set(id,el);
  }
  function removeMessageEl(el){
    if(!el)return;
    if(el.dataset.messageId)messageEls.delete(el.dataset.messageId);
    el.remove();
  }
  function removeIds(ids){
    (ids||[]).forEach(id=>removeMessageEl(messageEls.get(id)||log.querySelector(`[data-message-id="${cssEscape(id)}"]`)));
  }
  function removeFromElementOnward(el){
    let cur=el;
    while(cur){
      const next=cur.nextElementSibling;
      if(cur.classList&&cur.classList.contains('chat-message'))removeMessageEl(cur);
      cur=next;
    }
  }
  async function deleteMessage(el){
    const id=el.dataset.messageId;
    if(id&&thread){try{await apiPost('/message/delete',{thread,id});}catch(e){}}
    removeMessageEl(el);
  }
  async function editPrompt(el){
    const text=el.dataset.text||'';
    const id=el.dataset.messageId;
    if(id&&thread){
      try{const j=await apiPost('/message/truncate',{thread,id});removeIds(j.removed);}
      catch(e){removeFromElementOnward(el);}
    }else{removeFromElementOnward(el);}
    msg.value=text;autoresize();msg.focus();
  }
  function renderFooter(el,role,meta){
    el.querySelector('.message-footer')?.remove();
    const footer=document.createElement('div');
    footer.className='message-footer';
    footer.appendChild(buildMeta(meta));
    const actions=document.createElement('div');
    actions.className='message-actions';
    actions.appendChild(iconButton('copy','Copy message',btn=>copyText(el.dataset.text||'',btn)));
    if(role==='user')actions.appendChild(iconButton('edit','Edit prompt',()=>editPrompt(el)));
    actions.appendChild(iconButton('trash','Delete message',()=>deleteMessage(el)));
    footer.appendChild(actions);
    el.appendChild(footer);
  }
  function append(role,text,opts={}){
    const el=document.createElement('div');
    el.className=`chat-message ${role}`;
    el.dataset.role=role;
    el.dataset.text=text||'';
    assignMessageId(el,opts.id||uid());
    const bubble=document.createElement('div');
    bubble.className=(role==='user'?'u':'a')+' md';
    bubble.innerHTML=formatMessage(role,text);
    el.appendChild(bubble);
    renderFooter(el,role,opts.meta);
    log.appendChild(el);log.scrollTop=log.scrollHeight;prepareLinks(el);
    return el;
  }
  function updateMessage(el,role,text,meta){
    el.className=`chat-message ${role}`;
    el.dataset.role=role;
    el.dataset.text=text||'';
    const bubble=el.querySelector('.u,.a')||document.createElement('div');
    bubble.className=(role==='user'?'u':'a')+' md';
    bubble.innerHTML=formatMessage(role,text);
    if(!bubble.parentElement)el.prepend(bubble);
    renderFooter(el,role,meta);
    prepareLinks(el);log.scrollTop=log.scrollHeight;
  }
  function looksLikeBrowse(text){
    const s=String(text||'').toLowerCase();
    if(/(current date|today'?s date|what date is it|what day is it|what time is it|current time)/.test(s)){return false;}
    return /(look\s*up|search|browse|latest|current|recent|today|news|online|weather|forecast|temperature|price|score|schedule|status|right now|at the moment|currently|http:\/\/|https:\/\/)/.test(s);
  }
  function createPendingBubble(userText){
    const el=document.createElement('div');
    el.className='chat-message assistant';
    assignMessageId(el,uid());
    const bubble=document.createElement('div');
    bubble.className='a md pending';
    bubble.setAttribute('aria-live','polite');
    const status=document.createElement('span');
    status.className='pending-status';
    const time=document.createElement('span');
    time.className='pending-time';
    const isBrowse=looksLikeBrowse(userText);
    const started=Date.now();
    const statuses=isBrowse?['Looking things up','Reading search results','Composing answer']:['Thinking','Still working','Composing answer'];
    bubble.innerHTML='<b>Assistant:</b> <span class="pending-row"><span class="pending-dots" aria-hidden="true"><i></i><i></i><i></i></span></span>';
    bubble.querySelector('.pending-row').append(status,time);
    el.appendChild(bubble);log.appendChild(el);log.scrollTop=log.scrollHeight;
    function refresh(){const elapsed=Math.max(0,Math.floor((Date.now()-started)/1000));status.textContent=statuses[elapsed>=12?2:elapsed>=4?1:0];time.textContent=elapsed>=3?`${elapsed}s`:'';log.scrollTop=log.scrollHeight;}
    refresh();
    const interval=setInterval(refresh,1000);
    return {
      element:el,
      done(text,opts={}){
        clearInterval(interval);
        bubble.removeAttribute('aria-live');
        if(opts.id)assignMessageId(el,opts.id);
        updateMessage(el,'assistant',text||'I could not get a response from the model. Try rephrasing or ask me to check a specific source.',opts.meta);
      },
      fail(error){
        clearInterval(interval);
        updateMessage(el,'assistant','Error: '+(error.message||error),null);
      }
    };
  }
  async function postChat(text){
    const r=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({thread,message:text})});
    const j=await r.json();thread=j.thread;return j;
  }
  function autoresize(){
    msg.style.height='auto';
    const h=Math.min(160,msg.scrollHeight);
    msg.style.height=h+'px';
    send.style.height=h+'px';
  }
  msg.addEventListener('input',autoresize);
  window.addEventListener('resize',autoresize);

  send.onclick=async()=>{
    const t=msg.value.trim();if(!t)return;
    const userEl=append('user',t);
    const pending=createPendingBubble(t);
    msg.value='';autoresize();send.disabled=true;send.textContent=looksLikeBrowse(t)?'Searching':'Thinking';
    try{
      const j=await postChat(t);
      if(j.user_id)assignMessageId(userEl,j.user_id);
      pending.done(j.answer,{id:j.assistant_id,meta:j.meta});
    }catch(e){pending.fail(e);}
    finally{send.disabled=false;send.textContent='Send';}
  };
  msg.addEventListener('keydown',e=>{
    if(e.isComposing)return;
    if(e.key==='Enter'){
      if(e.shiftKey)return;
      e.preventDefault();send.click();
    }
  });
  autoresize();
</script>
